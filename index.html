<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지지엠 킴보식 가사 생성기</title>
    <link rel="stylesheet" href="./assets/styles.css">
    <script src="./assets/app.js" defer></script>
</head>
<body>
    <main class="app">
        <header class="hero">
            <h1 class="title">지지엠 킴보식<br>가사 생성기</h1>
            <p class="intro">지지엠 킴보식 가사 생성기와 함께라면<br>당신도 지지엠 킴보식 가사를 만들 수 있습니다!</p>
        </header>

        <section class="main-pane">
            <section class="beat-box" aria-label="비트 플레이어">
                <iframe
                    class="beat-frame"
                    src="https://www.youtube-nocookie.com/embed/hDICqbQJ6fA"
                    title="랩 연습용 비트"
                    loading="lazy"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen></iframe>
            </section>

            <section class="output" id="output" aria-live="polite">
                <div class="lyrics" id="lyrics"></div>
            </section>
        </section>

        <footer class="footer">
            본 페이지는 지지엠 킴보식 가사 생성 웹페이지입니다. 실제 아티스트와 무관합니다.
        </footer>
    </main>

    <div class="action-bar">
        <div class="action-bar-inner">
            <button class="button" id="generateButton" type="button" disabled>생성</button>
            <button class="button" id="shareButton" type="button" disabled>내 가사 공유하기</button>
        </div>
    </div>
</body>
</html>
