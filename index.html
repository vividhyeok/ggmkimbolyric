<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지지엠 킴보식 가사 생성기</title>
    <link rel="stylesheet" href="./assets/styles.css">
    <script src="./assets/app.js" defer></script>
</head>
<body>
    <main class="app">
        <h1 class="title">지지엠 킴보식 가사 생성기</h1>
        <p class="intro">지지엠 킴보식 가사 생성기와 함께라면 당신도 지지엠 킴보식 가사를 만들 수 있습니다!</p>

        <section class="output" id="output" aria-live="polite">
            <div class="lyrics" id="lyrics"></div>
        </section>

        <div class="controls">
            <button class="button" id="generateButton" type="button" disabled>생성</button>
            <button class="button" id="copyButton" type="button" disabled>복사</button>
        </div>
    </main>
</body>
</html>
